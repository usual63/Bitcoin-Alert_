name: Bitcoin Quant Alert Daily

on:
  schedule:
    # 한국 시간(KST) 매일 오전 6시 = UTC 기준 매일 오후 9시 (21:00)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-alert:
    runs-on: ubuntu-latest
    steps:
      # 버전 v3 -> v4로 업데이트
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 버전 v4 -> v5로 업데이트
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 오타 수정: python-network -> python-version
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Run Bitcoin Strategy Alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python btc_alert_script.py
