name: Daily Market Crash Alert

on:
  schedule:
    # UTC 22:00 = 한국 시간(KST) 매일 오전 07:00 (서머타임 시 06:00)
    # 1-5는 월~금요일(미국 거래일 기준)을 의미합니다
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  run-alert-system:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Required Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance fredapi

      - name: Execute Alert Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python btc_alert_script.py
