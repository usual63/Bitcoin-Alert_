name: Bitcoin Quant Strategy Bot

on:
  schedule:
    # 4시간봉 마감 시간에 맞추어 하루 6회 실행 (UTC 기준 0, 4, 8, 12, 16, 20시)
    # 한국 시간(KST) 기준 오전 9시, 오후 1시, 5시, 9시, 오전 1시, 5시
    - cron: '0 0,4,8,12,16,20 * * *'
  
  # 수동으로 즉시 실행할 수 있는 버튼 활성화
  workflow_dispatch:

jobs:
  run-quant-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 소스 코드를 서버로 복사
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 파이썬 환경 세팅
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 파이썬 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 퀀트 봇(파이썬 스크립트) 실행 및 API 키 매핑 (★가장 중요한 핵심 단계)
      - name: Run Bitcoin Quant Strategy Script
        run: python btc_alert_script.py
        env:
          # GitHub Secrets에 등록된 보안 키들을 파이썬 환경 변수로 주입합니다.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CQ_API_KEY: ${{ secrets.CQ_API_KEY }}
