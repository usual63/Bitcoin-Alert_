name: Bitcoin Quant Bot

on:
  schedule:
    # 글로벌 트래픽 병목을 피해 매시 7분, 37분에 몰래 구동합니다 (30분 주기)
    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ★ 필수 추가: 깃허브 액션 봇이 alert_state.json 파일을 리포지토리에 쓸 수 있는 권한 부여
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Bitcoin Quant Bot
        run: python btc_alert_script.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save Bot Memory (Auto Commit)
        run: |
          git config --global user.name "Quant-Bot"
          git config --global user.email "quant-bot@github.actions"
          git add alert_state.json
          # 메모리 파일에 변화가 있을 때만 깃허브에 저장하여 다음 구동 시 기억을 유지합니다
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update bot memory state" && git push)
